<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Flexible de Inventario</title>
    <style>
        :root { --primary: #1e3a8a; --success: #10b981; --danger: #ef4444; --dark: #1f2937; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: var(--primary); }
        .tabs { display: flex; gap: 10px; }
        .tab-btn { padding: 10px 18px; border: none; background: #e5e7eb; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button.submit-btn { background: var(--primary); color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; color: #4b5563; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
        .badge.prestado { background: #fee2e2; color: var(--danger); }
        .badge.disponible { background: #dcfce7; color: var(--success); }
        .loading { text-align: center; color: #6b7280; padding: 20px; font-style: italic; }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Control de Equipos Dinámicos</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">Panel de Control</button>
            <button class="tab-btn" onclick="switchTab('formulario')">Registrar Movimiento</button>
        </div>
    </div>

    <div id="tab-dashboard" class="tab-content active">
        <h3>Estado del Inventario Detectado</h3>
        <div id="loading-text" class="loading">Sincronizando con Google Sheets...</div>
        <table id="inventoryTable" style="display: none;">
            <thead>
                <tr>
                    <th>Detalle del Equipo / Kit Armado</th>
                    <th>Estado Actual</th>
                    <th>Último Operador</th>
                    <th>Fecha Registro</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                </tbody>
        </table>
    </div>

    <div id="tab-formulario" class="tab-content">
        <h3>Registrar Salida o Entrada</h3>
        <form id="loanForm">
            <div class="form-group">
                <label for="solicitante">Nombre del Responsable:</label>
                <input type="text" id="solicitante" required placeholder="Ej: Carlos Mendoza">
            </div>

            <div class="form-group">
                <label for="articulo">¿Qué se está llevando o devolviendo? (Escríbalo libremente):</label>
                <input type="text" id="articulo" required placeholder="Ej: Fusionadora en maleta amarilla + 2 cables extra y alicate">
            </div>

            <div class="form-group">
                <label for="estado">Operación:</label>
                <select id="estado" required>
                    <option value="PRESTADO">Retirar de Bodega (Préstamo)</option>
                    <option value="DEVUELTO">Devolver a Bodega (Reingreso)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="observaciones">Notas adicionales del estado:</label>
                <textarea id="observaciones" rows="3" placeholder="Ej: La maleta presenta un cierre suelto / Todo conforme..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Procesar Registro</button>
        </form>
        <div id="responseMessage" class="status-msg"></div>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA CON TU URL REAL DE GOOGLE APPS SCRIPT
    const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwguUMdCXX0UWIV6-rsZVuaO8k_WAogw1UfU11FLM8m2dDD_OtBxRSRYJsqkdKgOx8I/exec';

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if(tabName === 'dashboard') {
            document.querySelector('[onclick="switchTab(\'dashboard\')"]').classList.add('active');
            document.getElementById('tab-dashboard').classList.add('active');
            cargarDashboard();
        } else {
            document.querySelector('[onclick="switchTab(\'formulario\')"]').classList.add('active');
            document.getElementById('tab-formulario').classList.add('active');
        }
    }

    // El Dashboard ahora procesa dinámicamente cualquier texto que se haya ingresado
    async function cargarDashboard() {
        document.getElementById('loading-text').style.display = 'block';
        document.getElementById('inventoryTable').style.display = 'none';
        
        try {
            const response = await fetch(GOOGLE_WEB_APP_URL);
            const resultado = await response.json();
            
            if (resultado.status === 'success') {
                const registros = resultado.data;
                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';

                if(registros.length === 0) {
                    document.getElementById('loading-text').innerText = 'No hay registros en la base de datos aún.';
                    return;
                }

                // Agrupar dinámicamente para extraer el último estado de cada artículo único escrito
                const ultimosEstados = {};
                
                // Al venir invertidos desde el Apps Script, el primero que aparezca en el loop es el más reciente
                registros.forEach(reg => {
                    const nombreLimpio = reg.articulo.trim();
                    if (!ultimosEstados[nombreLimpio]) {
                        ultimosEstados[nombreLimpio] = reg;
                    }
                });

                // Renderizar la tabla con los elementos descubiertos en caliente
                for (const nombreEquipo in ultimosEstados) {
                    const reg = ultimosEstados[nombreEquipo];
                    const fecha = new Date(reg.fecha).toLocaleDateString('es-CL', {hour: '2-digit', minute:'2-digit'});
                    
                    let estadoHtml = '<span class="badge disponible">En Bodega</span>';
                    let operador = `Devuelto por ${reg.solicitante}`;

                    if (reg.estado === 'PRESTADO') {
                        estadoHtml = '<span class="badge prestado">Prestado</span>';
                        operador = reg.solicitante;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${nombreEquipo}</strong></td>
                            <td>${estadoHtml}</td>
                            <td>${operador}</td>
                            <td><small>${fecha}</small></td>
                        </tr>
                    `;
                }

                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('inventoryTable').style.display = 'table';
            }
        } catch (error) {
            document.getElementById('loading-text').innerText = 'Error de sincronización. Compruebe la URL de la API.';
            console.error(error);
        }
    }

    // Envío de datos
    document.getElementById('loanForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('responseMessage');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Guardando de forma segura...';
        msgDiv.style.display = 'none';

        const payload = {
            solicitante: document.getElementById('solicitante').value,
            articulo: document.getElementById('articulo').value,
            estado: document.getElementById('estado').value,
            observaciones: document.getElementById('observaciones').value || 'Sin observaciones.'
        };

        try {
            await fetch(GOOGLE_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            msgDiv.style.backgroundColor = '#dcfce7';
            msgDiv.style.color = '#166534';
            msgDiv.innerText = '¡Registrado! Los correos institucionales han sido notificados.';
            msgDiv.style.display = 'block';
            document.getElementById('loanForm').reset();
        } catch (error) {
            msgDiv.style.backgroundColor = '#fee2e2';
            msgDiv.style.color = '#991b1b';
            msgDiv.innerText = 'Error en el envío.';
            msgDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Procesando Registro';
        }
    });

    window.onload = cargarDashboard;
</script>

</body>
</html>
